server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # Root directory for static assets
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Dynamic TonConnect Manifest
    location = /tonconnect-manifest.json {
        proxy_pass http://backend:3001/api/manifest;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy REST API to Backend
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy Socket.io to Backend (with WebSocket support)
    location /socket.io/ {
        proxy_pass http://backend:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Fallback to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache control for assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
